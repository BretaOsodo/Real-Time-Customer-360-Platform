networks:
  data_pipeline:
    external: true

volumes:
  grafana-data:

services:
  kafka1:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka1
    hostname: kafka1
    ports:
      - "127.0.0.1:9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server 127.0.0.1:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      CLUSTER_ID: bgVKLUurTM6-Wx0gyGaPxQ
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka1:29092,EXTERNAL://127.0.0.1:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:29093,2@kafka2:29093,3@kafka3:29093,4@kafka4:29093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    networks:
      - data_pipeline

  kafka2:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka2
    hostname: kafka2
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server 127.0.0.1:9093 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      CLUSTER_ID: bgVKLUurTM6-Wx0gyGaPxQ
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka2:29092,EXTERNAL://127.0.0.1:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:29093,2@kafka2:29093,3@kafka3:29093,4@kafka4:29093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    networks:
      - data_pipeline

  kafka3:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka3
    hostname: kafka3
    ports:
      - "127.0.0.1:9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server 127.0.0.1:9094 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      CLUSTER_ID: bgVKLUurTM6-Wx0gyGaPxQ
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka3:29092,EXTERNAL://127.0.0.1:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:29093,2@kafka2:29093,3@kafka3:29093,4@kafka4:29093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    networks:
      - data_pipeline

  kafka4:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka4
    hostname: kafka4
    ports:
      - "127.0.0.1:9095:9095"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server 127.0.0.1:9095 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      CLUSTER_ID: bgVKLUurTM6-Wx0gyGaPxQ
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9095,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka4:29092,EXTERNAL://127.0.0.1:9095"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:29093,2@kafka2:29093,3@kafka3:29093,4@kafka4:29093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    networks:
      - data_pipeline

  #schema registry
  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    ports:
      - "127.0.0.1:8082:8082"

    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      kafka4:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka1:29092,INTERNAL://kafka2:29092,INTERNAL://kafka3:29092,INTERNAL://kafka4:29092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8082'
    networks:
      - data_pipeline

  #kafdrop for UI
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop

    ports:
      - "127.0.0.1:9000:9000"

    environment:
      KAFKA_BROKERCONNECT: "kafka1:29092,kafka2:29092,kafka3:29092,kafka4:29092"
      JVM_OPTS: "-Xms32M -Xmx128M"

    depends_on:
      - kafka1
      - kafka2
      - kafka3
      - kafka4
    networks:
      - data_pipeline
  spark-master:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile

    container_name: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master

    ports:
      - "127.0.0.1:9090:8080"
      - "127.0.0.1:7077:7077"


    volumes:
      - ./:/opt/project
    networks:
      - data_pipeline

    restart: unless-stopped

  spark-worker-1:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile

    container_name: spark-worker-1
    ports:
      - "127.0.0.1:8090:8081"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    depends_on:
      - spark-master

    environment:
      SPARK_MODE: worker
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      SPARK_MASTER_URL: spark://spark-master:7077



    volumes:
      - ./:/opt/project

    networks:
      - data_pipeline

    restart: unless-stopped

  spark-worker-2:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile

    container_name: spark-worker-2
    ports:
      - "127.0.0.1:8091:8081"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077

    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 3g
      SPARK_MASTER_URL: spark://spark-master:7077


    volumes:
      - ./:/opt/project
    networks:
      - data_pipeline

    restart: unless-stopped

  spark-worker-3:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile

    container_name: spark-worker-3
    ports:
      - "127.0.0.1:8092:8081"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077

    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 3g
      SPARK_MASTER_URL: spark://spark-master:7077


    volumes:
      - ./:/opt/project
    networks:
      - data_pipeline

    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: prometheus
    ports:
      - "127.0.0.1:9096:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    depends_on:
      - kafka1
      - kafka2
      - kafka3
      - kafka4
    networks:
      - data_pipeline

  alertmanager:
    image: prom/alertmanager
    ports:
      - "127.0.0.1:59093:9093"
    networks:
      - data_pipeline

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: kafka-exporter

    command:
      - "--kafka.server=kafka1:29092"
      - "--kafka.server=kafka2:29092"
      - "--kafka.server=kafka3:29092"
      - "--kafka.server=kafka4:29092"
      - "--verbosity=1"
    ports:
      - "127.0.0.1:9308:9308"
    depends_on:
      - kafka4
      - kafka3
      - kafka2
      - kafka1
    networks:
      - data_pipeline

  grafana:
      image: grafana/grafana:latest
      container_name: grafana
      ports:
        - "127.0.0.1:3000:3000"

      volumes:
        - grafana-data:/var/lib/grafana
        - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
        - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      networks:
        - data_pipeline

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "127.0.0.1:8084:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - data_pipeline
    restart: unless-stopped